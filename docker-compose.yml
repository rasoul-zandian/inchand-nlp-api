services:
  inchand-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inchand-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000